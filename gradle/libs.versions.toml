constraintlayout = "2.2.1"
lifecycleLivedataKtx = "2.10.0"
lifecycleViewmodelKtx = "2.10.0"
navigationFragment = "2.9.8"
navigationUi = "2.9.8"
hilt = "2.51.1"
retrofit = "2.11.0"
okhttp = "4.12.0"
gson = "2.11.0"
