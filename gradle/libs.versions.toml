[versions]
agp = "8.13.2"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
archCoreTesting = "2.2.0"
hiltAndroidTesting = "2.51.1"
appcompat = "1.7.1"
material = "1.13.0"
